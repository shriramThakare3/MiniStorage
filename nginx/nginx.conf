# nginx/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────
# Reverse proxy for the Mini Cloud Storage API.
# Listens on port 80 and forwards to the `api` container on port 8000.
# File upload size limit is set to 110 MB (slightly above the 100 MB app limit
# so Nginx never cuts off a request that the app itself would accept).ssss
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;
    gzip           on;
    gzip_types     text/plain application/json;

    # ── Upload size ───────────────────────────────────────────────────────────
    # Must be >= MAX_UPLOAD_SIZE_MB in core/config.py
    client_max_body_size 110M;

    # ── Upstream ──────────────────────────────────────────────────────────────
    # Docker Compose DNS resolves "api" to the api container.
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # ── Server ────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Proxy all traffic to FastAPI
        location / {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Extended timeouts for large file uploads / downloads
            proxy_connect_timeout  15s;
            proxy_send_timeout     300s;
            proxy_read_timeout     300s;

            # Disable buffering for downloads so files stream directly
            proxy_buffering       off;
            proxy_request_buffering off;
        }

        # Lightweight Nginx health check (does not hit the API)
        location = /ping {
            access_log off;
            return 200 "pong\n";
            add_header Content-Type text/plain;
        }
    }
}
